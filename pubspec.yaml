name: ahadith

description: "الموسوعة الحديثية هو تطبيق يهدف إلى جمع الأحاديث النبوية وتنظيمها في منصة سهلة الاستخدام، تتيح البحث المتقدم، تصفح الكتب والمصادر، عرض تراجم الرواة والمحدثين، والتعرف على الأحاديث المنتشرة التي لا تصح. كما يوفر مزايا مثل المفضلة، وحديث اليوم، والأسئلة، والإشعارات"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  reactive_forms: ^18.2.0
  go_router: ^17.0.0
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.2.3
  icons_launcher: ^3.0.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0
  shared_preferences: ^2.5.3
  flex_color_scheme: ^8.3.1
  supabase_flutter: ^2.0.0
  lottie: ^3.3.2
  cached_network_image: ^3.4.1
  reactive_image_picker: ^8.0.1
  image_picker: ^1.1.2
  file_picker: ^10.3.10
  flutter_dotenv: ^6.0.0
  http: ^1.2.2
  google_sign_in: ^7.2.0
  sign_in_button: ^4.0.1
  readmore: ^3.0.0
  share_plus: ^7.2.0
  speech_to_text: ^7.3.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.0.2
  awesome_notifications: ^0.10.0
  syncfusion_flutter_datagrid: ^31.2.3
  syncfusion_flutter_core: ^31.2.3
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  freezed: ^3.2.5
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/fonts/
    - assets/svgs/
    - .env

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo.ttf

icons_launcher:
  image_path: "assets/images/pic1.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true
    web:
      enable: true
    windows:
      enable: true
    macos:
      enable: true
    linux:
      enable: true

flutter_native_splash:
  color: "#FDFBF8"
  image: assets/images/pic1_splash.png
  android_gravity: center
  ios_content_mode: center
  web_image_mode: contain
  android: true
  ios: true
  web: true
  android_12:
    color: "#FDFBF8"
    image: assets/images/pic1_splash.png
